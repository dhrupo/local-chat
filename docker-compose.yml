services:
  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APP_URL: ${APP_URL:-http://localhost:8000}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost,localhost:8000,127.0.0.1,127.0.0.1:8000}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: local_chat
      DB_USERNAME: local_chat
      DB_PASSWORD: local_chat
      BROADCAST_CONNECTION: reverb
      BROADCAST_DRIVER: reverb
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
      REVERB_APP_ID: ${REVERB_APP_ID:-local-chat}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-local-chat-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-change-this-secret}
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      VITE_REVERB_APP_KEY: ${REVERB_APP_KEY:-local-chat-key}
      VITE_REVERB_HOST: ${VITE_REVERB_HOST:-}
      VITE_REVERB_PORT: ${VITE_REVERB_PORT:-8080}
      VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-http}
    command: sh -lc "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000"
    volumes:
      - app-storage:/var/www/html/storage
    healthcheck:
      test: ["CMD", "php", "-r", "$$socket = @fsockopen('127.0.0.1', 8000); exit($$socket ? 0 : 1);"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      mysql:
        condition: service_healthy

  reverb:
    build:
      context: .
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APP_URL: ${APP_URL:-http://localhost:8000}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost,localhost:8000,127.0.0.1,127.0.0.1:8000}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: local_chat
      DB_USERNAME: local_chat
      DB_PASSWORD: local_chat
      BROADCAST_CONNECTION: reverb
      BROADCAST_DRIVER: reverb
      REVERB_APP_ID: ${REVERB_APP_ID:-local-chat}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-local-chat-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-change-this-secret}
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      REVERB_HOST: localhost
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    ports:
      - "8080:8080"
    volumes:
      - app-storage:/var/www/html/storage
    healthcheck:
      test: ["CMD", "php", "-r", "$$socket = @fsockopen('127.0.0.1', 8080); exit($$socket ? 0 : 1);"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      mysql:
        condition: service_healthy

  proxy:
    image: nginx:1.27-alpine
    profiles: ["https"]
    restart: unless-stopped
    ports:
      - "${HTTPS_PORT:-8443}:8443"
    volumes:
      - ./docker/https/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--no-check-certificate", "https://127.0.0.1:8443"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      app:
        condition: service_healthy
      reverb:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: local_chat
      MYSQL_USER: local_chat
      MYSQL_PASSWORD: local_chat
      MYSQL_ROOT_PASSWORD: local_chat_root
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ulocal_chat", "-plocal_chat"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  app-storage:
  mysql-data:
